<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Social Engineering Awareness Game | Cyber-Defender Training</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 10% 20%, #0a0f1e, #030712);
      font-family: 'Inter', 'Segoe UI', 'Fira Code', monospace;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    /* Cyber-terminal container */
    .game-container {
      max-width: 850px;
      width: 100%;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 2rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(56, 189, 248, 0.1);
      backdrop-filter: blur(2px);
      overflow: hidden;
      transition: all 0.2s;
    }

    /* Header area */
    .cyber-header {
      background: #0b1120;
      padding: 1.2rem 1.8rem;
      border-bottom: 2px solid #1e293b;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: baseline;
      gap: 0.8rem;
    }

    .title h1 {
      font-size: 1.5rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      font-weight: 700;
    }

    .title p {
      font-size: 0.7rem;
      color: #94a3b8;
      font-family: monospace;
    }

    .user-stats {
      background: #02061780;
      border-radius: 2rem;
      padding: 0.5rem 1.2rem;
      border: 1px solid #22c55e30;
      text-align: right;
    }

    .rank-badge {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .rank-icon {
      font-size: 1.8rem;
      filter: drop-shadow(0 0 4px #38bdf8);
    }

    .rank-name {
      font-weight: bold;
      color: #38bdf8;
      background: #0f172a;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      font-size: 0.8rem;
      border: 1px solid #38bdf8;
    }

    .xp-bar-container {
      width: 180px;
      background: #1e293b;
      border-radius: 20px;
      height: 8px;
      overflow: hidden;
      margin-top: 6px;
    }

    .xp-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #22c55e, #38bdf8);
      border-radius: 20px;
      transition: width 0.3s ease;
    }

    .xp-text {
      font-size: 0.7rem;
      color: #cbd5e1;
    }

    /* main content */
    .game-main {
      padding: 2rem 1.8rem;
    }

    /* scenario card */
    .scenario-card {
      background: #111827dd;
      border-radius: 1.5rem;
      padding: 1.5rem;
      border: 1px solid #334155;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
      margin-bottom: 1.5rem;
    }

    .scenario-type {
      display: inline-block;
      background: #1e293b;
      padding: 0.2rem 0.9rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 600;
      color: #38bdf8;
      margin-bottom: 1rem;
      letter-spacing: 1px;
    }

    .scenario-text {
      font-size: 1.25rem;
      line-height: 1.4;
      color: #f1f5f9;
      margin: 0.8rem 0;
      font-weight: 500;
    }

    /* choices */
    .choices-area {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin: 1.8rem 0 1.2rem;
    }

    .choice-btn {
      background: #0f172a;
      border: 1.5px solid #334155;
      padding: 1rem 1.2rem;
      border-radius: 1.2rem;
      font-size: 1rem;
      text-align: left;
      color: #e2e8f0;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .choice-btn:hover {
      border-color: #38bdf8;
      background: #1e293b;
      transform: translateX(6px);
    }

    .action-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .hint-btn {
      background: transparent;
      border: 1px dashed #f59e0b;
      color: #fbbf24;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.1s;
    }

    .hint-btn.disabled-btn {
      opacity: 0.5;
      cursor: not-allowed;
      border-color: #475569;
      color: #94a3b8;
    }

    .next-btn {
      background: #22c55e20;
      border: 1px solid #22c55e;
      color: #22c55e;
      padding: 0.5rem 1.6rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .next-btn:active {
      transform: scale(0.96);
    }

    /* feedback panel (red flag analysis) */
    .feedback-panel {
      background: #020617;
      border-left: 5px solid #38bdf8;
      padding: 1rem;
      border-radius: 1rem;
      margin-top: 1.2rem;
      font-size: 0.9rem;
      color: #cbd5e6;
      transition: 0.2s;
    }

    .feedback-correct {
      border-left-color: #22c55e;
      background: #14532d30;
    }
    .feedback-wrong {
      border-left-color: #ef4444;
      background: #7f1d1d30;
    }

    /* registration panel */
    .register-panel {
      background: #0f172a;
      padding: 2rem;
      text-align: center;
    }

    .register-panel input, .register-panel select {
      width: 100%;
      padding: 0.9rem;
      margin: 0.8rem 0;
      background: #1e293b;
      border: 1px solid #38bdf8;
      border-radius: 1rem;
      color: white;
      font-size: 1rem;
    }

    .register-panel button {
      background: #38bdf8;
      border: none;
      padding: 0.8rem 1.8rem;
      border-radius: 2rem;
      font-weight: bold;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #0f172a;
      border-left: 5px solid #f59e0b;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      font-size: 0.8rem;
      z-index: 1000;
      box-shadow: 0 4px 12px black;
    }

    @media (max-width: 600px) {
      .game-main {
        padding: 1.2rem;
      }
      .choice-btn {
        padding: 0.8rem;
        font-size: 0.9rem;
      }
      .scenario-text {
        font-size: 1rem;
      }
      .rank-badge {
        justify-content: flex-start;
      }
      .cyber-header {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
<div class="game-container" id="gameRoot">
  <!-- dynamic content will be injected -->
  <div id="dynamicUI">Loading security protocols...</div>
</div>

<script>
  // ----------------------------- FALLBACK EMBEDDED DATASET (JSON) -----------------------------
  const FALLBACK_SCENARIOS = [
    { Occupation: "Student", Level: 1, Type: "Email", Scenario: "You receive an email from 'campus-support@university-help.net' saying your library access expires in 24 hours. Link: verify-now.net", Hint: "Inspect the sender domain: does it match your official university domain? Usually ends with .edu", ChoiceA: "Click the link to renew immediately", ChoiceB: "Forward the email to IT security and delete it", CorrectChoice: "Forward the email to IT security and delete it", RedFlag: "Urgency + Fake Domain — attackers pressure you to act fast without thinking." },
    { Occupation: "Student", Level: 2, Type: "SMS", Scenario: "Text message: 'URGENT: Your student bursary payment failed. Update details at: student-portal.co'", Hint: "Look for shortened links or suspicious TLDs like .co instead of .gov or .ac", ChoiceA: "Click the link to update banking info", ChoiceB: "Ignore and report as spam", CorrectChoice: "Ignore and report as spam", RedFlag: "Fear & Financial lure — creates panic to harvest credentials." },
    { Occupation: "Professional", Level: 1, Type: "Phone", Scenario: "A caller claims to be from IT support, says your Windows license expired, needs remote access urgently.", Hint: "Legit IT will never ask for unsolicited remote access.", ChoiceA: "Give remote access to fix the issue", ChoiceB: "Hang up and call your internal IT number", CorrectChoice: "Hang up and call your internal IT number", RedFlag: "Authority Impersonation + Urgency — common vishing technique." },
    { Occupation: "Professional", Level: 2, Type: "Email", Scenario: "CEO asks you to buy gift cards for clients and email codes ASAP. 'Confidential task'", Hint: "Executives rarely request gift cards via email. Verify via separate channel.", ChoiceA: "Comply and buy gift cards", ChoiceB: "Verify by calling the CEO's known number", CorrectChoice: "Verify by calling the CEO's known number", RedFlag: "Pretexting & Authority — fake executive request." },
    { Occupation: "Healthcare", Level: 1, Type: "Email", Scenario: "Email from 'HR' requesting your Epic login to verify training compliance. Contains official logo.", Hint: "Never share login credentials; check sender's real address.", ChoiceA: "Provide login details for compliance", ChoiceB: "Report phishing to security team", CorrectChoice: "Report phishing to security team", RedFlag: "Pretexting using healthcare compliance fear." },
    { Occupation: "Healthcare", Level: 2, Type: "Physical", Scenario: "A person in scrubs tries to follow you through a badge-access door, says they forgot ID.", Hint: "Tailgating is a physical social engineering attack.", ChoiceA: "Hold the door, they seem like staff", ChoiceB: "Ask them to get security escort", CorrectChoice: "Ask them to get security escort", RedFlag: "Bypassing physical security using politeness & authority." },
    { Occupation: "Government", Level: 1, Type: "Email", Scenario: "You receive a memo: 'Mandatory security training – click here to log in with PIV credentials'", Hint: "Check if the link goes to .gov domain, hover before clicking.", ChoiceA: "Click and login quickly", ChoiceB: "Verify through internal portal directly", CorrectChoice: "Verify through internal portal directly", RedFlag: "Urgency + fear of missing training deadline." }
  ];

  // Global state
  let appState = {
    gameData: [],           // parsed from CSV or fallback
    currentUser: null,
    occupationScenarios: [], // filtered scenarios by occupation + sorted by level
    currentScenarioIdx: 0,
    totalXP: 0,
    currentRank: "Cyber Novice",
    hintUsedForCurrent: false,
    awaitingNext: false,    // after answer, block choices until next
    currentFeedback: null,
    sessionCompleted: false
  };

  // Rank thresholds
  const RANKS = [
    { name: "Cyber Novice", minXP: 0, icon: "🛡️" },
    { name: "Digital Defender", minXP: 100, icon: "🔒" },
    { name: "Security Sentinel", minXP: 250, icon: "⚡" },
    { name: "Cyber Commander", minXP: 500, icon: "🎖️" }
  ];

  // Helper: compute rank from XP
  function getRankFromXP(xp) {
    let rank = RANKS[0];
    for (let i = RANKS.length-1; i >= 0; i--) {
      if (xp >= RANKS[i].minXP) {
        rank = RANKS[i];
        break;
      }
    }
    return rank;
  }

  // update XP bar and rank display
  function updateRankAndUI() {
    const rankObj = getRankFromXP(appState.totalXP);
    appState.currentRank = rankObj.name;
    const rankIcon = rankObj.icon;
    const nextRank = RANKS.find(r => r.minXP > appState.totalXP) || RANKS[RANKS.length-1];
    const nextMin = nextRank.minXP;
    const currentMin = rankObj.minXP;
    let percent = 0;
    if (nextMin > currentMin) {
      percent = ((appState.totalXP - currentMin) / (nextMin - currentMin)) * 100;
      percent = Math.min(100, Math.max(0, percent));
    } else {
      percent = 100;
    }
    const rankNameSpan = document.getElementById("rankNameSpan");
    const rankIconSpan = document.getElementById("rankIconSpan");
    const xpFill = document.getElementById("xpFill");
    const xpTextSpan = document.getElementById("xpTextSpan");
    if (rankNameSpan) rankNameSpan.innerText = appState.currentRank;
    if (rankIconSpan) rankIconSpan.innerText = rankIcon;
    if (xpFill) xpFill.style.width = `${percent}%`;
    if (xpTextSpan) xpTextSpan.innerText = `${appState.totalXP} XP`;
  }

  // save to localStorage (user + XP + progress)
  function persistProgress() {
    if (!appState.currentUser) return;
    const saveObj = {
      name: appState.currentUser.name,
      age: appState.currentUser.age,
      occupation: appState.currentUser.occupation,
      totalXP: appState.totalXP,
      scenarioIdx: appState.currentScenarioIdx,
      occupationScenariosLen: appState.occupationScenarios.length,
      hintUsedForCurrent: false // reset hint flag per scenario on load; we just store index
    };
    localStorage.setItem("seGameProgress", JSON.stringify(saveObj));
  }

  function loadPersisted() {
    const raw = localStorage.getItem("seGameProgress");
    if (!raw) return null;
    try {
      return JSON.parse(raw);
    } catch(e) { return null; }
  }

  // Fetch CSV from Google Sheets (public CSV)
  async function fetchGameData() {
    // REPLACE WITH YOUR PUBLISHED GOOGLE SHEETS CSV LINK (must be public)
    const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSampleYourSheetId/pub?output=csv"; 
    try {
      const response = await fetch(CSV_URL, { cache: "no-store" });
      if (!response.ok) throw new Error("HTTP error");
      const csvText = await response.text();
      const parsed = parseCSVToArray(csvText);
      if (parsed.length === 0) throw new Error("Empty CSV");
      return parsed;
    } catch (err) {
      console.warn("CSV fetch failed, using fallback data", err);
      showToast("⚠️ Offline Mode: Using local training database.");
      return [...FALLBACK_SCENARIOS];
    }
  }

  // simple CSV parser (respects quoted fields minimally but works for our column set)
  function parseCSVToArray(csv) {
    const lines = csv.split(/\r?\n/).filter(l => l.trim().length > 0);
    if (lines.length < 2) return [];
    const headers = lines[0].split(',').map(h => h.trim());
    const requiredCols = ["Occupation","Level","Type","Scenario","Hint","ChoiceA","ChoiceB","CorrectChoice","RedFlag"];
    const colIndex = {};
    for (let i=0; i<headers.length; i++) {
      colIndex[headers[i]] = i;
    }
    const missing = requiredCols.filter(c => !(c in colIndex));
    if (missing.length) {
      console.warn("CSV missing columns:", missing);
      return [];
    }
    const result = [];
    for (let i=1; i<lines.length; i++) {
      const row = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
      if (row.length < 9) continue;
      const scenario = {
        Occupation: row[colIndex["Occupation"]],
        Level: parseInt(row[colIndex["Level"]],10),
        Type: row[colIndex["Type"]],
        Scenario: row[colIndex["Scenario"]],
        Hint: row[colIndex["Hint"]],
        ChoiceA: row[colIndex["ChoiceA"]],
        ChoiceB: row[colIndex["ChoiceB"]],
        CorrectChoice: row[colIndex["CorrectChoice"]],
        RedFlag: row[colIndex["RedFlag"]]
      };
      if (!isNaN(scenario.Level)) result.push(scenario);
    }
    return result;
  }

  // Filter scenarios based on occupation, sort by Level
  function filterScenariosByOccupation(occupation, allData) {
    let filtered = allData.filter(s => s.Occupation.toLowerCase() === occupation.toLowerCase());
    if (filtered.length === 0) {
      // fallback: if no exact match, use 'Student' or first available occupation category
      const fallbackOccup = allData.find(s => s.Occupation)?.Occupation || "Student";
      filtered = allData.filter(s => s.Occupation === fallbackOccup);
      showToast(`No scenarios for "${occupation}", using ${fallbackOccup} scenarios.`);
    }
    filtered.sort((a,b) => a.Level - b.Level);
    return filtered;
  }

  // Render the current scenario
  function renderCurrentScenario() {
    if (appState.sessionCompleted || !appState.occupationScenarios.length || appState.currentScenarioIdx >= appState.occupationScenarios.length) {
      renderCompletionScreen();
      return;
    }
    const scenario = appState.occupationScenarios[appState.currentScenarioIdx];
    const mainDiv = document.getElementById("dynamicUI");
    if (!mainDiv) return;

    mainDiv.innerHTML = `
      <div class="game-main">
        <div class="scenario-card">
          <span class="scenario-type">📧 ${scenario.Type} | Level ${scenario.Level}</span>
          <div class="scenario-text">${escapeHtml(scenario.Scenario)}</div>
          <div class="choices-area">
            <button class="choice-btn" data-choice="A">🔹 ${escapeHtml(scenario.ChoiceA)}</button>
            <button class="choice-btn" data-choice="B">🔹 ${escapeHtml(scenario.ChoiceB)}</button>
          </div>
          <div class="action-bar">
            <button id="hintActionBtn" class="hint-btn">💡 Show Hint (-3 XP)</button>
            <button id="nextScenarioBtn" class="next-btn" style="display:none;">▶ Next Challenge</button>
          </div>
          <div id="feedbackArea"></div>
        </div>
      </div>
    `;
    // attach handlers
    const hintBtn = document.getElementById("hintActionBtn");
    const nextBtn = document.getElementById("nextScenarioBtn");
    const choiceBtns = document.querySelectorAll(".choice-btn");

    function disableChoices(disabled) {
      choiceBtns.forEach(btn => {
        if (disabled) btn.style.pointerEvents = "none";
        else btn.style.pointerEvents = "auto";
      });
    }

    choiceBtns.forEach(btn => {
      btn.addEventListener("click", (e) => {
        if (appState.awaitingNext) return;
        const selected = btn.getAttribute("data-choice") === "A" ? scenario.ChoiceA : scenario.ChoiceB;
        const isCorrect = (selected === scenario.CorrectChoice);
        // XP handling: +10 for correct, +2 participation always
        let xpGain = 2; // participation always
        if (isCorrect) xpGain += 10;
        appState.totalXP += xpGain;
        // ensure non-negative
        if (appState.totalXP < 0) appState.totalXP = 0;
        updateRankAndUI();
        persistProgress();

        // Red flag analysis + feedback
        const feedbackDiv = document.getElementById("feedbackArea");
        const correctBadge = isCorrect ? "✅ CORRECT" : "❌ INCORRECT";
        const psyText = scenario.RedFlag || "No specific red flag available";
        feedbackDiv.innerHTML = `
          <div class="feedback-panel ${isCorrect ? 'feedback-correct' : 'feedback-wrong'}">
            <strong>${correctBadge}</strong> &nbsp;| 🧠 <strong>Red Flag Analysis:</strong> ${escapeHtml(psyText)}<br>
            <span style="font-size:0.8rem;">📊 You earned ${xpGain} XP (participation + ${isCorrect ? 'correct bonus' : 'no bonus'}). Total XP: ${appState.totalXP}</span>
          </div>
        `;
        // disable choices, show next button, hide hint
        disableChoices(true);
        if (hintBtn) hintBtn.style.display = "none";
        nextBtn.style.display = "inline-block";
        appState.awaitingNext = true;
        // reset hint flag for this scenario (no penalty already applied)
        appState.hintUsedForCurrent = false;
      });
    });

    // Hint logic
    if (hintBtn) {
      hintBtn.addEventListener("click", () => {
        if (appState.awaitingNext) return;
        if (appState.hintUsedForCurrent) {
          showToast("Hint already used for this scenario!");
          return;
        }
        if (appState.totalXP < 3) {
          showToast("Not enough XP to use hint (need 3 XP)");
          return;
        }
        // deduct 3 XP
        appState.totalXP -= 3;
        if (appState.totalXP < 0) appState.totalXP = 0;
        updateRankAndUI();
        persistProgress();
        appState.hintUsedForCurrent = true;
        hintBtn.innerText = "💡 Hint Revealed (-3 XP)";
        hintBtn.classList.add("disabled-btn");
        hintBtn.style.pointerEvents = "none";
        // show pedagogical clue
        const feedbackDiv = document.getElementById("feedbackArea");
        feedbackDiv.innerHTML = `
          <div class="feedback-panel" style="border-left-color:#f59e0b;">
            <strong>🔍 Pedagogical Hint:</strong> ${escapeHtml(scenario.Hint)}
          </div>
        `;
      });
    }

    nextBtn.addEventListener("click", () => {
      appState.currentScenarioIdx++;
      if (appState.currentScenarioIdx >= appState.occupationScenarios.length) {
        renderCompletionScreen();
      } else {
        appState.awaitingNext = false;
        renderCurrentScenario();
      }
      persistProgress();
    });
  }

  function renderCompletionScreen() {
    const rankFinal = getRankFromXP(appState.totalXP);
    const mainDiv = document.getElementById("dynamicUI");
    mainDiv.innerHTML = `
      <div class="game-main" style="text-align:center;">
        <div class="scenario-card">
          <span class="scenario-type">🏆 MISSION COMPLETE</span>
          <div class="scenario-text">You have completed all available awareness scenarios.</div>
          <div style="font-size:2rem; margin:1rem;">${rankFinal.icon}</div>
          <p>Final Rank: <strong style="color:#38bdf8">${rankFinal.name}</strong> (${appState.totalXP} XP)</p>
          <p style="margin-top:1rem;">Your ability to detect social engineering attacks has improved.</p>
          <button id="restartGameBtn" style="margin-top:1.5rem; background:#38bdf8; border:none; padding:0.7rem 2rem; border-radius:2rem; font-weight:bold;">⟳ New Training Session</button>
        </div>
      </div>
    `;
    document.getElementById("restartGameBtn")?.addEventListener("click", () => {
      localStorage.removeItem("seGameProgress");
      location.reload();
    });
    appState.sessionCompleted = true;
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  function showToast(msg) {
    let toastDiv = document.querySelector(".toast");
    if(toastDiv) toastDiv.remove();
    const div = document.createElement("div");
    div.className = "toast";
    div.innerText = msg;
    document.body.appendChild(div);
    setTimeout(() => div.remove(), 3500);
  }

  // Registration + occupation dropdown from loaded data
  async function showRegistration() {
    appState.gameData = await fetchGameData();
    // Cache to localStorage? we just store data in memory, also fallback already inside.
    const uniqueOccupations = [...new Map(appState.gameData.map(item => [item.Occupation.toLowerCase(), item.Occupation])).values()];
    const occupationOptions = uniqueOccupations.map(occ => `<option value="${escapeHtml(occ)}">${escapeHtml(occ)}</option>`).join('');
    const mainDiv = document.getElementById("dynamicUI");
    mainDiv.innerHTML = `
      <div class="register-panel">
        <h2 style="color:#38bdf8;">🔐 Social Engineering Awareness Game</h2>
        <p style="margin-bottom:1rem;">Register to begin your cyber-defense training</p>
        <input type="text" id="regName" placeholder="Your Name / Callsign" autocomplete="off">
        <input type="number" id="regAge" placeholder="Age" min="10" max="100">
        <select id="regOccupation">
          <option value="">-- Select your occupation --</option>
          ${occupationOptions}
        </select>
        <button id="startGameBtn">🎮 Start Mission</button>
        <p style="font-size:0.7rem; margin-top:1rem;">⚠️ Real attacks use authority, urgency, and fear. Learn to spot red flags.</p>
      </div>
    `;
    document.getElementById("startGameBtn").addEventListener("click", () => {
      const name = document.getElementById("regName").value.trim();
      const age = parseInt(document.getElementById("regAge").value,10);
      const occupation = document.getElementById("regOccupation").value;
      if (!name || isNaN(age) || age<10 || age>100 || !occupation) {
        showToast("Please fill all fields correctly (age 10-100)");
        return;
      }
      const filteredScen = filterScenariosByOccupation(occupation, appState.gameData);
      if (filteredScen.length === 0) {
        showToast("No training scenarios found for this role. Contact admin.");
        return;
      }
      appState.currentUser = { name, age, occupation };
      appState.occupationScenarios = filteredScen;
      appState.currentScenarioIdx = 0;
      appState.totalXP = 0;
      appState.hintUsedForCurrent = false;
      appState.awaitingNext = false;
      appState.sessionCompleted = false;
      updateRankAndUI();
      persistProgress();
      renderGameInterface();
      renderCurrentScenario();
    });
  }

  function renderGameInterface() {
    const container = document.getElementById("dynamicUI");
    container.innerHTML = `
      <div class="cyber-header">
        <div class="title">
          <h1>⚠️ SOCIAL ENGINEERING LAB</h1>
          <p>constructivist training • threat simulation</p>
        </div>
        <div class="user-stats">
          <div class="rank-badge">
            <span class="rank-icon" id="rankIconSpan">🛡️</span>
            <span class="rank-name" id="rankNameSpan">Cyber Novice</span>
            <div class="xp-bar-container"><div class="xp-fill" id="xpFill"></div></div>
            <span class="xp-text" id="xpTextSpan">0 XP</span>
          </div>
          <div style="font-size:0.7rem;">👤 ${escapeHtml(appState.currentUser.name)} | ${escapeHtml(appState.currentUser.occupation)}</div>
        </div>
      </div>
      <div id="scenarioRenderArea"></div>
    `;
    const area = document.getElementById("scenarioRenderArea");
    area.innerHTML = `<div class="game-main">Loading countermeasures...</div>`;
    // after container ready, re-bind render
    const origRender = renderCurrentScenario;
    window.renderCurrentScenario = origRender;
    // call after DOM updated
    setTimeout(() => {
      if(!appState.sessionCompleted) origRender();
    }, 10);
  }

  // check if persisted user exists and resume
  async function initGame() {
    const saved = loadPersisted();
    if (saved && saved.name) {
      appState.gameData = await fetchGameData();
      const filtered = filterScenariosByOccupation(saved.occupation, appState.gameData);
      if (filtered.length && saved.scenarioIdx < filtered.length) {
        appState.currentUser = { name: saved.name, age: saved.age, occupation: saved.occupation };
        appState.occupationScenarios = filtered;
        appState.currentScenarioIdx = saved.scenarioIdx;
        appState.totalXP = saved.totalXP;
        appState.awaitingNext = false;
        appState.hintUsedForCurrent = false;
        appState.sessionCompleted = false;
        updateRankAndUI();
        renderGameInterface();
        renderCurrentScenario();
        showToast(`Welcome back, ${saved.name}. Resume your training.`);
        return;
      }
    }
    showRegistration();
  }
  initGame();
</script>
</body>
</html>
